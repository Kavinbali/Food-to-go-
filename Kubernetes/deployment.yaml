apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-to-go-deployment
  labels:
    app: food-to-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-to-go
  template:
    metadata:
      labels:
        app: food-to-go
    spec:
      containers:
      - name: food-to-go
        image: 235494812877.dkr.ecr.ap-south-1.amazonaws.com/food-to-go:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
